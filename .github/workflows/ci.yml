name: Java CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Maven
        run: mvn -B package

      - name: Run jar
        run: |
          ls -la target
          java -jar target/*.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: hello-world
          path: target/*.jar
